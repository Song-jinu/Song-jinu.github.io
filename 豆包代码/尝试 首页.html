<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光厂 - 视频素材更专业</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #1a1a1a;
            color: #fff;
            overflow-x: hidden;
        }

        /* 顶部导航栏 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            font-weight: 500;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(90deg, #ff4d4f, #722ed1);
            border-radius: 4px;
        }

        .nav-links {
            display: flex;
            gap: 28px;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            transition: color 0.2s;
            position: relative;
        }

        .nav-links a:hover {
            color: #ff4d4f;
        }

        .nav-links a .badge {
            position: absolute;
            top: -8px;
            right: -12px;
            background-color: #1890ff;
            color: #fff;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 8px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .header-right a {
            color: #fff;
            text-decoration: none;
            font-size: 16px;
        }

        .login-btn {
            background-color: #fff;
            color: #1a1a1a;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 500;
        }

        /* 主视觉区域 */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            z-index: -1;
        }

        .hero-title {
            font-size: 48px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .hero-subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
        }

        /* 搜索框区域 */
        .search-container {
            width: 100%;
            max-width: 720px;
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
        }

        .search-tabs {
            display: flex;
            border-bottom: 1px solid #f0f0f0;
        }

        .search-tab {
            padding: 12px 20px;
            font-size: 16px;
            color: #666;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .search-tab.active {
            color: #1a1a1a;
            border-bottom-color: #ff4d4f;
            font-weight: 500;
        }

        .search-bar {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 12px;
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            color: #333;
        }

        .search-input::placeholder {
            color: #999;
        }

        .search-actions {
            display: flex;
            gap: 12px;
        }

        .search-btn {
            background: none;
            border: 1px solid #e8e8e8;
            border-radius: 4px;
            padding: 6px 12px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .search-submit {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            color: #666;
        }

        /* 搜索标签 */
        .search-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
            max-width: 720px;
            justify-content: center;
        }

        .search-tag {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .search-tag:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* 底部特性栏 */
        .features {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 0 40px;
        }

        .feature-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
        }

        .feature-icon {
            width: 24px;
            height: 24px;
        }

        .feature-title {
            font-size: 16px;
            font-weight: 500;
        }

        .feature-desc {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* 右侧悬浮按钮 */
        .float-buttons {
            position: fixed;
            right: 20px;
            bottom: 80px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .float-btn {
            width: 48px;
            height: 48px;
            background-color: #fff;
            color: #1a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <div class="logo-icon"></div>
                <span>光厂</span>

    <!-- 主视觉区域 -->
    <section class="hero">
        <img class="hero-bg" src="https://picsum.photos/id/1035/1920/1080" alt="戏曲人物背景">

        <!-- 搜索框 -->
        <div class="search-container">

                <div class="search-tab">图片</div>

                <div class="search-tab">服务</div>
            </div>
            <div class="search-bar">
                <input type="text" class="search-input" placeholder="输入关键词/编号，找视频">
                <div class="search-actions">
                    <button class="search-btn">📷 画面搜索</button>
                    <button class="search-btn">💬 AI搜索</button>
                </div>
                <button class="search-submit">🔍</button>

        </div>

        <!-- 搜索标签 -->
        <div class="search-tags">
            <span class="search-tag">片头</span>
            <span class="search-tag">科技</span>
            <span class="search-tag">字幕</span>
            <span class="search-tag">倒计时</span>
            <span class="search-tag">标题</span>
            <span class="search-tag">logo</span>
            <span class="search-tag">地图</span>
            <span class="search-tag">分类</span>
            <span class="search-tag">文字</span>
            <span class="search-tag">ai</span>
            <span class="search-tag">快闪</span>
            <span class="search-tag">图文</span>
            <span class="search-tag">数据</span>
            <span class="search-tag">风景</span>
            <span class="search-tag">更多</span>
        </div>
    </section>

    <!-- 底部特性栏 -->
    <section class="features">
        <div class="feature-item">
            <div class="feature-icon">🔍</div>
            <div class="feature-title">精准搜索</div>
            <div class="feature-desc">自研多模态搜索算法</div>
        </div>
        <div class="feature-item">
            <div class="feature-icon">🛡️</div>
            <div class="feature-title">正版授权</div>
            <div class="feature-desc">每件素材50万保障金</div>
        </div>
        <div class="feature-item">
            <div class="feature-icon">⬆️</div>
            <div class="feature-title">海量更新</div>
            <div class="feature-desc">汇集全球优质供稿人</div>
        </div>
        <div class="feature-item">
            <div class="feature-icon">❤️</div>
            <div class="feature-title">安心售后</div>
            <div class="feature-desc">质量问题直接退</div>
        </div>
    </section>

    <!-- 右侧悬浮按钮 -->
    <div class="float-buttons">
        <div class="float-btn">🛒</div>
        <div class="float-btn">客服</div>
        <div class="float-btn">工单</div>
    </div>
</body>
</html>
