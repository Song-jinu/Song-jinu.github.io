<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目板块</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Microsoft YaHei', sans-serif; }
        body { padding: 20px; background: linear-gradient(to bottom, #6dd5fa 0%, #2980b9 100%); background-attachment: fixed; min-height: 100vh; }
        .section { max-width: 700px; margin: 50px auto; background: rgba(255,255,255,.95); padding: 35px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        h3 { color: #1e40af; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; font-size: 20px; }
        .proj-item { color: #334155; line-height: 1.8; margin-bottom: 20px; padding: 15px; background: #f0f9ff; border-radius: 10px; }
        .proj-title { font-weight: bold; color: #0284c7; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="section">
        <h3><i class="fas fa-project-diagram"></i>项目经历</h3>
        <div class="proj-item">
            <div class="proj-title">1. 家庭纪念册制作</div>
            <p>牵头收集家人各类生活照片、成长瞬间，精心筛选编辑文字介绍，搭配合适的排版和素材，制作电子纪念册。全程负责照片整理、文字撰写、排版设计等工作，最终生成可线上浏览、可打印留存的纪念册，完整记录家庭美好回忆，增进家人情感联结。</p>
        </div>
        <div class="proj-item">
            <div class="proj-title">2. 家庭日常规划</div>
            <p>协助家人制定日常作息表、节假日出行计划和家庭事务清单，结合家人的生活习惯和需求，优化生活节奏。合理分配家庭任务，提醒家人重要事宜，有效提升家庭生活效率，减少琐碎事务带来的困扰，让家庭生活更有序、更温馨。</p>
        </div>
    </div>
</body>
</html>
