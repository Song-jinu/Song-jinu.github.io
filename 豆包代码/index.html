<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的家庭 - 成员信息</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        /* 全局背景：星空雪山 */
        body {
            background: #0f172a;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255,255,255,0.05) 0%, transparent 20%),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.05) 0%, transparent 20%),
                url('https://picsum.photos/id/1036/1920/1080');
            background-size: cover;
            background-attachment: fixed;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* 顶部导航栏 */
        .navbar {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-left {
            font-size: 14px;
            color: #94a3b8;
        }
        .navbar-right {
            display: flex;
            gap: 25px;
        }
        .navbar-right a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }
        .navbar-right a:hover {
            color: #38bdf8;
        }
        .navbar-right a.active {
            color: #38bdf8;
            border-bottom: 2px solid #38bdf8;
            padding-bottom: 8px;
        }

        /* 主容器：侧边栏 + 内容区 */
        .container {
            display: flex;
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            gap: 30px;
        }

        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            height: fit-content;
        }
        .sidebar-avatar {
            text-align: center;
            margin-bottom: 20px;
        }
        .sidebar-avatar img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #38bdf8;
        }
        .sidebar-name {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .sidebar-desc {
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 20px;
        }
        .sidebar-info {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 10px;
        }
        .sidebar-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(90deg, #38bdf8, #0ea5e9);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }

        /* 内容区：家庭成员卡片 */
        .content {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }
        .family-card {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .family-card:hover {
            transform: translateY(-5px);
            border-color: #38bdf8;
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.2);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .card-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid #38bdf8;
        }
        .card-name {
            font-size: 20px;
            font-weight: bold;
        }
        .card-role {
            font-size: 13px;
            color: #38bdf8;
        }
        .card-info {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-info i {
            color: #38bdf8;
            width: 16px;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
            }
            .content {
                grid-template-columns: 1fr;
            }
            .navbar-right {
                gap: 15px;
                font-size: 11px;
            }
        }
    
    </style>
</head>
<body>
    <!-- 顶部导航 -->
