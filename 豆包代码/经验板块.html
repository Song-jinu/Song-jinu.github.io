<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经验板块</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Microsoft YaHei', sans-serif; }
        body { padding: 20px; background: linear-gradient(to bottom, #6dd5fa 0%, #2980b9 100%); background-attachment: fixed; min-height: 100vh; }
        .section { max-width: 700px; margin: 50px auto; background: rgba(255,255,255,.95); padding: 35px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        h3 { color: #1e40af; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; font-size: 20px; }
        .exp-item { color: #334155; line-height: 1.8; margin-bottom: 20px; padding: 15px; background: #f0f9ff; border-radius: 10px; }
        .exp-title { font-weight: bold; color: #0284c7; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="section">
        <h3><i class="fas fa-briefcase"></i>个人经验</h3>
        <div class="exp-item">
            <div class="exp-title">学习/工作经验</div>
            <p>根据自身身份积累相关经验，认真对待每一项任务，主动学习新知识、新技能，不断提升自身专业素养和业务能力。在学习或工作中，注重细节、善于总结，积极配合他人，高效完成各项事宜，积累了丰富的实践经验。</p>
        </div>
        <div class="exp-item">
            <div class="exp-title">生活经验</div>
            <p>擅长自身爱好相关技能，在生活中乐于尝试、勇于担当，具备良好的沟通能力和团队协作意识。主动承担家庭或身边的力所能及之事，懂得换位思考、体谅他人，在相处中积累了宝贵的生活经验，也培养了沉稳、负责的性格。</p>
        </div>
    </div>
</body>
</html>
