<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客板块</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Microsoft YaHei', sans-serif; }
        body { padding: 20px; background: linear-gradient(to bottom, #6dd5fa 0%, #2980b9 100%); background-attachment: fixed; min-height: 100vh; }
        .section { max-width: 700px; margin: 50px auto; background: rgba(255,255,255,.95); padding: 35px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        h3 { color: #1e40af; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; font-size: 20px; }
        .blog-item { background: #f0f9ff; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        h4 { color: #0284c7; margin-bottom: 10px; font-size: 18px; }
        p { color: #334155; line-height: 1.8; font-size: 16px; }
        .blog-date { color: #64748b; font-size: 14px; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="section">
        <h3><i class="fas fa-book"></i>个人博客</h3>
        <div class="blog-item">
            <h4>家庭周末随笔</h4>
            <p>周末阳光正好，和家人一起去公园散步、野餐，妹妹追着蝴蝶跑，爸爸妈妈聊着家常，微风拂过，满是惬意。原来幸福从不是轰轰烈烈，而是这些平凡又温暖的瞬间，值得被一一记录，珍藏心底。</p>
            <div class="blog-date">发布日期：2026年3月29日</div>
        </div>
        <div class="blog-item">
            <h4>兴趣分享：不负热爱，慢慢成长</h4>
            <p>最近一直在坚持自己的爱好，每天抽出一点时间练习，虽然过程中有疲惫，但每一次进步都让人充满成就感。爱好不仅能丰富课余和生活时间，还能磨练心性，让自己在忙碌中找到属于自己的节奏，不负热爱，不负时光。</p>
            <div class="blog-date">发布日期：2026年3月25日</div>
        </div>
    </div>
</body>
</html>
