<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭成员介绍 - 专属页面</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        /* 全局背景：星空雪山 */
        body {
            background: #0f172a;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255,255,255,0.05) 0%, transparent 20%),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.05) 0%, transparent 20%),
                url('https://picsum.photos/id/1036/1920/1080');
            background-size: cover;
            background-attachment: fixed;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* 顶部导航栏 */
        .navbar {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-left {
            font-size: 14px;
            color: #94a3b8;
        }
        .navbar-right {
            display: flex;
            gap: 25px;
        }
        .navbar-right a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }
        .navbar-right a:hover {
            color: #38bdf8;
        }
        .navbar-right a.active {
            color: #38bdf8;
            border-bottom: 2px solid #38bdf8;
            padding-bottom: 8px;
        }

        /* 主容器：侧边栏 + 内容区 */
        .container {
            display: flex;
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            gap: 30px;
        }

        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            height: fit-content;
        }
        .sidebar-avatar {
            text-align: center;
            margin-bottom: 20px;
        }
        .sidebar-avatar img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #38bdf8;
        }
        .sidebar-name {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .sidebar-desc {
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 20px;
        }
        .sidebar-info {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 10px;
        }
        .sidebar-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(90deg, #38bdf8, #0ea5e9);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }

        /* 内容区：单人详情 */
        .content {
            flex: 1;
        }
        .profile-card {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 25px;
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #38bdf8;
        }
        .profile-name {
            font-size: 28px;
            font-weight: bold;
        }
        .profile-role {
            font-size: 16px;
            color: #38bdf8;
        }
        .profile-info {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .profile-info i {
            color: #38bdf8;
            width: 20px;
        }
        .profile-desc {
            line-height: 1.8;
            color: #94a3b8;
            font-size: 15px;
            margin-top: 20px;
        }

        /* 生活照片网格 */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .photo-item {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .photo-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
            }
            .photo-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .navbar-right {
                gap: 15px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="navbar">
        <div class="navbar-left">个人简历</div>
        <div class="navbar-right">
            <a href="#" class="active">主页</a>
            <a href="#">项目</a>
            <a href="#">经验</a>
            <a href="#">联系</a>
            <a href="#">博客</a>
            <a href="#">其他</a>
            <i class="fas fa-moon" style="color: #94a3b8;"></i>
        </div>
    </div>

    <div class="container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-avatar">
                <img src="https://tse4-mm.cn.bing.net/th/id/OIP-C.ck6jBfqLBdrBitMPRwel6wHaJ0?w=161&h=213&c=7&r=0&o=7&dpr=1.8&pid=1.7&rm=3" alt="爸爸">
            </div>
            <div class="sidebar-name">赵石磊的个人简历</div>
            <div class="sidebar-desc">家里的顶梁柱，稳重可靠</div>
            <div class="sidebar-info">毕业院校：初中</div> 
            <div class="sidebar-info">职业：高级工程师</div>
            <button class="sidebar-btn">联系我</button>
        </div>

        <!-- 内容区：单人详情 -->
        <div class="content">
            <div class="profile-card">
                <div class="profile-header">
                    <img src="https://tse4-mm.cn.bing.net/th/id/OIP-C.ck6jBfqLBdrBitMPRwel6wHaJ0?w=161&h=213&c=7&r=0&o=7&dpr=1.8&pid=1.7&rm=3" alt="爸爸" class="profile-avatar">
                    <div>
                        <div class="profile-name">赵石磊</div>
                        <div class="profile-role">父亲 / 家里的顶梁柱</div>
                    </div>
                </div>
                <div class="profile-info"><i class="fas fa-birthday-cake"></i> 生日：1984年12月13日</div>
                <div class="profile-info"><i class="fas fa-phone"></i> 电话：135****5969</div>
                <div class="profile-info"><i class="fas fa-briefcase"></i> 职业：高级工程师</div>
                <div class="profile-info"><i class="fas fa-heart"></i> 爱好：喝茶，抽烟</div>
                <div class="profile-desc">
                    爸爸是家里的顶梁柱，性格稳重、有责任心，平时工作认真负责，回到家里会尽力陪伴家人。他待人温和，做事踏实，遇到问题总能冷静处理，是我们全家最可靠的依靠。闲暇时喜欢户外运动和钓鱼，心态乐观开朗，用行动教会我们坚强与善良。
                </div>
            </div> 

            <div class="profile-card">
                <h3 style="margin-bottom: 20px; color: #38bdf8;">生活精彩瞬间</h3>
                <div class="photo-grid">
                    <div class="photo-item"><img src="https://picsum.photos/id/1015/300/200" alt="生活照"></div>
                    <div class="photo-item"><img src="https://picsum.photos/id/1016/300/200" alt="生活照"></div>
                    <div class="photo-item"><img src="https://picsum.photos/id/1018/300/200" alt="生活照"></div>
                    <div class="photo-item"><img src="https://picsum.photos/id/1019/300/200" alt="生活照"></div>
                    <div class="photo-item"><img src="https://picsum.photos/id/1020/300/200" alt="生活照"></div>
                    <div class="photo-item"><img src="https://picsum.photos/id/1022/300/200" alt="生活照"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
