<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系板块</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Microsoft YaHei', sans-serif; }
        body { padding: 20px; background: linear-gradient(to bottom, #6dd5fa 0%, #2980b9 100%); background-attachment: fixed; min-height: 100vh; }
        .section { max-width: 700px; margin: 50px auto; background: rgba(255,255,255,.95); padding: 35px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        h3 { color: #1e40af; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; font-size: 20px; }
        .contact-item { color: #334155; line-height: 1.8; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; font-size: 16px; }
        .contact-item i { color: #0284c7; font-size: 18px; }
    </style>
</head>
<body>
    <div class="section">
        <h3><i class="fas fa-phone"></i>联系方式</h3>
        <div class="contact-item"><i class="fas fa-mobile-alt"></i> 电话：138****8888（替换为自身电话，方便家人随时联系）</div>
        <div class="contact-item"><i class="fas fa-envelope"></i> 邮箱：xxx@163.com（可选添加，用于接收消息、文件等）</div>
        <div class="contact-item"><i class="fas fa-home"></i> 住址：XXX市XXX区XXX小区（可选添加，方便家人或亲友到访）</div>
        <div class="contact-item"><i class="fas fa-weixin"></i> 微信：xxxxxx（可选添加，日常沟通更便捷）</div>
    </div>
</body>
</html>
